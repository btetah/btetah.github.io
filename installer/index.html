<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dtk-02 Simulation Software - Ket Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="grid-overlay" aria-hidden="true"></div>

  <main class="wizard-window" role="application" aria-label="dtk-02 setup wizard">
    <header class="wizard-header">
      <div class="header-brand">
        <div class="logo-chip" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="brand-text">KT KET TRAINER</div>
      </div>

      <h1>Welcome to the dtk-02 Setup Wizard</h1>

      <div class="window-controls" aria-label="window controls">
        <button type="button" id="win-min" aria-label="Minimize">-</button>
        <button type="button" id="win-max" aria-label="Maximize">[]</button>
        <button type="button" id="win-close" aria-label="Close">x</button>
      </div>
    </header>

    <nav class="wizard-steps" aria-label="Installation steps">
      <span>Welcome</span>
      <span>License</span>
      <span>Directory</span>
      <span class="active">Installing</span>
      <span>Finish</span>
    </nav>

    <section class="wizard-body">
      <div class="install-progress">
        <div class="flow-icons" aria-hidden="true">
          <div class="icon-box">⚙</div>
          <div class="arrow">→</div>
          <div class="icon-box">&lt;/&gt;</div>
          <div class="arrow">→</div>
          <div class="icon-box">◈</div>
        </div>

        <p class="progress-text">Installing dtk-02 core components... <strong>(48%)</strong></p>

        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="48" aria-label="Installation progress">
          <div class="progress-fill"></div>
        </div>
      </div>

      <aside class="device-preview" aria-label="Device preview">
        <div class="device-frame">
          <div class="screen-glow">dtk-02</div>
          <div class="device-lines" aria-hidden="true"></div>
          <div class="device-nodes" aria-hidden="true">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
      </aside>

      <div class="potato-zone" aria-label="Installer assistant">
        <div class="speech-bubble">لا تقلق، أنا  بتيته وجاي أراقبلكم التثبيت! 😄</div>
        <svg class="potato" viewBox="0 0 180 130" role="img" aria-label="Potato shape">
          <defs>
            <radialGradient id="potatoGrad" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#9f6c3a"></stop>
              <stop offset="100%" stop-color="#6d4425"></stop>
            </radialGradient>
          </defs>
          <path d="M38 74c-8-20 3-39 25-48 20-8 47-8 66 3 22 13 28 37 16 57-13 20-42 33-71 30-20-2-31-14-36-28z" fill="url(#potatoGrad)"></path>
        </svg>
      </div>
    </section>

    <footer class="wizard-footer">
      <button type="button" class="btn dim" disabled>&lt; Back</button>
      <button type="button" id="next-btn" class="btn neon">Next &gt;</button>
      <button type="button" id="cancel-btn" class="btn">Cancel</button>
    </footer>
  </main>

  <script src="./wizard.js"></script>
</body>
</html>
